# Database connection
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:aeromigrate_sandbox}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configurations
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# AI configuration
aeromigrate.ai.provider=${AI_PROVIDER:gemini}
aeromigrate.ai.api-key=${GEMINI_API_KEY:}
aeromigrate.ai.openai.api-key=${OPENAI_API_KEY:}
aeromigrate.ai.model-name=${AI_MODEL_NAME:gemini-1.5-flash}

# Server port
server.port=${SERVER_PORT:8081}
