# ===================================================================
# AeroMigrate Backend Configuration Example
# Copy this file to application.properties and update the credentials
# ===================================================================

# Database Connection (MySQL)
# Hostname of the MySQL server (default: 127.0.0.1)
DB_HOST=127.0.0.1
# Port of the MySQL server (default: 3306)
DB_PORT=3306
# Database schema name
DB_NAME=aeromigrate_sandbox
# Username to authenticate database connection
DB_USERNAME=root
# Password to authenticate database connection
DB_PASSWORD=

# AI Configuration (LangChain4j Providers)
# Choose between: gemini, openai
AI_PROVIDER=gemini

# Google Gemini API Key (Required if AI_PROVIDER is gemini)
# Obtain from Google AI Studio: https://aistudio.google.com/
GEMINI_API_KEY=your_gemini_api_key_here

# OpenAI API Key (Required if AI_PROVIDER is openai)
# Obtain from OpenAI Dashboard: https://platform.openai.com/
# OPENAI_API_KEY=your_openai_api_key_here

# AI Model Name (default: gemini-1.5-flash or gpt-4o)
AI_MODEL_NAME=gemini-1.5-flash

# Server Port Configuration (default: 8081)
SERVER_PORT=8081
